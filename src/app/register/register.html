<div class="register-container">
    <div class="form-container">
        <form #registerForm="ngForm">
            <mat-card>
                <mat-card-header>
                    <mat-card-title>Register</mat-card-title>
                </mat-card-header>
                <mat-card-content>
                    <div class="form-body">
                        <mat-form-field>
                            <mat-label>Name: *</mat-label>
                            <input type="text" placeholder="Insert name..." matInput>
                        </mat-form-field>
                        <mat-form-field>
                            <mat-label>CPF: *</mat-label>
                            <input type="text" placeholder="Insert CPF..." matInput>
                        </mat-form-field>
                    </div>
                </mat-card-content>
            </mat-card>
        </form>
    </div>
</div>
